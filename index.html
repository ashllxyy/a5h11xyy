<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>arunesh's portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/atropos@2.0.2/atropos.css" />
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="atropos my-atropos">
        <div class="atropos-scale">
            <div class="atropos-rotate">
                <div class="atropos-inner">
                    <div class="scene-root">
                        <div class="scene active" id="scene-home">
                            <div class="container">
                                <i data-lucide="gamepad-2" class="icon"></i>
                                <h1>arunesh<span class="sub-heading">[a5h//xyy]</span></h1>
                                <div class="vflex gap-2">
                                    <div class="hflex gap-5">
                                        <div class="activity">
                                            <div class="vflex">
                                                <div class="tabs">
                                                    <div class="tab active">
                                                        <span class="hflex">
                                                            <i data-lucide="activity" class="content-icon"></i>
                                                            activity
                                                        </span>
                                                    </div>
                                                    <div class="tab">
                                                        <span class="hflex">
                                                            <i data-lucide="info" class="content-icon"></i>
                                                            about
                                                        </span>
                                                    </div>
                                                    <div class="tab">
                                                        <span class="hflex">
                                                            <i data-lucide="lightbulb" class="content-icon"></i>
                                                            ethos
                                                        </span>
                                                    </div>
                                                    <div class="underline"></div>
                                                </div>
                                                <div class="content vflex" id="activity-list">
                                                    <!-- This is where the activities will be rendered -->
                                                </div>
                                            </div>
                                        </div>
                                        <div class="projects">
                                            <div class="tabs">
                                                <div class="tab active">
                                                    <span class="hflex">
                                                        <i data-lucide="folder" class="content-icon"></i>
                                                        projects
                                                    </span>
                                                </div>
                                                <div class="underline"></div>
                                            </div>
                                            <div class="content vflex gap-2">
                                                <div class="project-item vflex gap-2">
                                                    <div class="project-title">
                                                        <i data-lucide="circle" class="dot"></i>
                                                        <span>OpenAI's CLIP</span>
                                                    </div>
                                                    <div class="project-tag personal-project">personal</div>
                                                </div>
                                                <div class="project-item vflex gap-2">
                                                    <div class="project-title">
                                                        <i data-lucide="circle" class="dot"></i>
                                                        <span>NFPay</span>
                                                    </div>
                                                    <div class="project-tag freelance-project">freelance</div>
                                                </div>
                                                <div class="project-item vflex gap-2">
                                                    <div class="project-title">
                                                        <i data-lucide="circle" class="dot"></i>
                                                        <span>Network Monitoring System</span>
                                                    </div>
                                                    <div class="project-tag business-project">business</div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="blogs">
                                        <div class="tabs">
                                            <div class="tab active">
                                                <span class="hflex">
                                                    <i data-lucide="book-open" class="content-icon"></i>
                                                    blogs
                                                </span>
                                            </div>
                                            <div class="underline"></div>
                                        </div>
                                        <div class="content vflex gap-2">
                                            <div class="project-item vflex gap-2">
                                                <div class="project-title">
                                                    <i data-lucide="circle" class="dot"></i>
                                                    <span>Inspiration</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
        <div class="foot">
            a small corner of my work
        </div>
        <script src="https://unpkg.com/lucide@latest"></script>
        <script src="https://cdn.jsdelivr.net/npm/atropos@2.0.2/atropos.min.js"></script>
        <script src="script.js"></script>
</body>

</html>
